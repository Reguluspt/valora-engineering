services:
  postgres:
    image: postgres:16
    container_name: valora-postgres
    environment:
      POSTGRES_DB: valora
      POSTGRES_USER: valora
      POSTGRES_PASSWORD: valora_local_password
    ports:
      - "5432:5432"
    volumes:
      - valora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valora -d valora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: valora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: valora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: valora
      MINIO_ROOT_PASSWORD: valora_local_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - valora_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valora-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - VALORA_ENV=production
      - VALORA_LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=valora
      - POSTGRES_USER=valora
      - POSTGRES_PASSWORD=valora_local_password
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=valora
      - S3_SECRET_ACCESS_KEY=valora_local_password
      - S3_BUCKET=valora-local
      - S3_REGION=us-east-1
      - BACKEND_CORS_ORIGINS=http://localhost
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: valora-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  valora_postgres_data:
  valora_minio_data:
