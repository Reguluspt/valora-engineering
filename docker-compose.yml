services:
  postgres:
    image: postgres:16
    container_name: valora-postgres
    environment:
      POSTGRES_DB: valora
      POSTGRES_USER: valora
      POSTGRES_PASSWORD: valora_local_password
    ports:
      - "5432:5432"
    volumes:
      - valora_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: valora-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: valora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: valora
      MINIO_ROOT_PASSWORD: valora_local_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - valora_minio_data:/data

volumes:
  valora_postgres_data:
  valora_minio_data:
