[project]
name = "valora-backend"
version = "0.0.1"
description = "Valora backend Sprint 0 skeleton"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic-settings>=2.4.0",
  "sqlalchemy>=2.0.0",
  "alembic>=1.13.0",
  "psycopg[binary]>=3.1.0",
  "argon2-cffi>=23.1.0",
  "openpyxl>=3.1.0",
  "python-multipart>=0.0.9",
  "xlrd>=2.0.1,<3",
  "boto3>=1.34.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "httpx>=0.27.0",
  "ruff>=0.6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint.per-file-ignores]
# Alembic migrations: autogenerated files containing unused imports/variables and SQLAlchemy boolean comparisons
"alembic/versions/*" = ["E712", "F401", "F841"]

# Specific API files: ignore E712 for SQLAlchemy boolean query expressions (where == False/True is preferred over is_ / is_not_)
"app/api/evidence.py" = ["E712"]
"app/api/master_data.py" = ["E712"]
"app/api/workbench.py" = ["E712"]
"app/api/workflow.py" = ["E712"]

# Specific test files: ignore F841 for unused local setup headers and dummy variables kept for structure consistency
"tests/test_change_request_api.py" = ["F841"]
"tests/test_master_data_api.py" = ["F841"]
"tests/test_s5_acceptance.py" = ["F841"]
"tests/test_workbench_api.py" = ["F841"]
"tests/test_workflow_api.py" = ["F841"]

[tool.setuptools]
packages = ["app"]

