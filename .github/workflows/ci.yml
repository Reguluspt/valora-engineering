name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "s12-*"
      - "s13-*"

jobs:
  committed-whitespace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify committed whitespace hygiene
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$BASE_SHA...$HEAD_SHA"
          elif [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && \
               git cat-file -e "$BEFORE_SHA^{commit}"; then
            git diff --check "$BEFORE_SHA...$HEAD_SHA"
          else
            BRANCH_BASE=$(git merge-base "$HEAD_SHA" "origin/$DEFAULT_BRANCH")
            git diff --check "$BRANCH_BASE...$HEAD_SHA"
          fi

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: valora
          POSTGRES_USER: valora
          POSTGRES_PASSWORD: valora_local_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Start MinIO (S3-compatible object storage)
        run: |
          docker run -d --name valora-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=valora \
            -e MINIO_ROOT_PASSWORD=valora_local_password \
            minio/minio:RELEASE.2024-12-18T13-15-44Z server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:9000/minio/health/live
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Bootstrap MinIO bucket for object-storage integration
        env:
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY_ID: valora
          S3_SECRET_ACCESS_KEY: valora_local_password
          S3_BUCKET: valora-local
          S3_REGION: us-east-1
        run: |
          python - <<'PY'
          import boto3
          from botocore.client import Config
          c = boto3.client(
              "s3",
              endpoint_url="http://localhost:9000",
              aws_access_key_id="valora",
              aws_secret_access_key="valora_local_password",
              region_name="us-east-1",
              config=Config(signature_version="s3v4"),
          )
          try:
              c.create_bucket(Bucket="valora-local")
          except Exception:
              pass
          c.head_bucket(Bucket="valora-local")
          print("minio bucket ready")
          PY
      - name: Run static checks and linting
        run: |
          ruff check .
      - name: Run Alembic migration smoke tests
        env:
          VALORA_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: valora
          POSTGRES_USER: valora
          POSTGRES_PASSWORD: valora_local_password
        run: |
          alembic upgrade head
      - name: Verify single migration head
        run: |
          HEADS_COUNT=$(alembic heads | wc -l)
          if [ "$HEADS_COUNT" -ne 1 ]; then
            echo "Error: Migration graph has multiple heads ($HEADS_COUNT)!"
            alembic heads
            exit 1
          fi
          echo "Migration graph verified: single head exists."
      - name: Run backend tests
        env:
          CI: "true"
          VALORA_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: valora
          POSTGRES_USER: valora
          POSTGRES_PASSWORD: valora_local_password
          TEST_DATABASE_URL: postgresql+psycopg://valora:valora_local_password@localhost:5432/valora
          S3_ENDPOINT_URL: http://localhost:9000
          S3_ACCESS_KEY_ID: valora
          S3_SECRET_ACCESS_KEY: valora_local_password
          S3_BUCKET: valora-local
          S3_REGION: us-east-1
        run: pytest -rs
      - name: Run Python dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit
      - name: Run security policy and secret scan
        run: python tests/check_security.py

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install worker dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run static checks and linting
        run: |
          ruff check .
      - name: Run worker tests
        run: pytest
      - name: Run Python dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Run frontend unit tests
        run: npm run test
      - name: Run Node dependency vulnerability scan
        run: npm audit --audit-level=high
